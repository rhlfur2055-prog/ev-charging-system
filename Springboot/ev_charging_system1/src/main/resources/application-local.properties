# Local development profile
# Activated via SPRING_PROFILES_ACTIVE=local (default)

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ev_charging}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:mbc}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Local CORS: Vite dev server + production Vercel app (override via env)
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173}

# Disable Flyway in dev unless you opt in
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:false}
