# Production profile
# Activated via SPRING_PROFILES_ACTIVE=prod

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# In prod, never auto-evolve schema. Use Flyway migrations instead.
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:validate}
spring.jpa.show-sql=false

# Connection pool tuning for managed Postgres
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:10}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:2}

# CORS must be set explicitly per deployment (Vercel domain + custom domain)
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}

# Flyway: enable when migrations are ready (db/migration/V1__init.sql etc.)
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:false}
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Reasonable logging in prod
logging.level.root=INFO
logging.level.com.example.ev_charging_system1=INFO
