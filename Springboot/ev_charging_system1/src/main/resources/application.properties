spring.application.name=ev-charging-system
server.port=${SERVER_PORT:8080}

# Active profile (override with SPRING_PROFILES_ACTIVE=prod in production)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# --- PostgreSQL (common) ---
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.database=postgresql
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# --- EV project paths (env-driven; profile files set sane defaults) ---
ev.python.exe=${EV_PYTHON_EXE:python3}
ev.python.script-dir=${EV_PYTHON_SCRIPT_DIR:src/main/resources/python}
ev.plate-logs.dir=${EV_PLATE_LOGS_DIR:./plate_logs}

# --- CORS allowlist (comma-separated). Profile files override. ---
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# --- Python execution tuning ---
ev.python.start-timeout-seconds=${EV_PYTHON_START_TIMEOUT:15}
ev.python.log-dir=${EV_PYTHON_LOG_DIR:./plate_logs/_python_logs}

# --- JWT (HS256). Use a 32+ character random secret; base64 preferred. ---
app.jwt.secret=${JWT_SECRET:dev-secret-change-me-please-32chars-minimum-xxxxx}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# --- Actuator (only health + info exposed) ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
